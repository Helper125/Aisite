<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List</title>
</head>
<body>
    <style>
        :root {
            --blue: #3b82f6;
            --blue-dark: #1e3a8a;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --text: #334155;
            --text-light: #64748b;
            --white: #ffffff;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--blue-light);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        header a {
            text-decoration: none;
            background: var(--blue);
            color: var(--white);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        header a:hover {
            background: var(--blue-dark);
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--blue-dark);
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .friend-item h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            margin: 0;
        }

        .friend-item button {
            background: var(--blue);
            color: var(--white);
            border: none;
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .friend-item button:hover {
            background: var(--blue-dark);
        }

        .friend-item .in-group {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
        }
    </style>

    <header>
        <a href="{% url 'list_user_in_togetherChat' chat.id %}">Zurück</a>
    </header>
    {% if friends %}
    <h2>Deine Freunde:</h2>
    {% for fr in friends %}
        <div class="friend-item">
            <h3>{{ fr.friend }}</h3>
            {% if fr.friend in chat.user.all %}
                <span class="in-group">in der Gruppe</span>
            {% else %}
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" name="add" value="{{ fr.friend.id }}">Hinzufügen</button>
                </form>
            {% endif %}
        </div>
    {% endfor %}
{% else %}
    <h2>Du hast keine Freunde</h2>
{% endif %}
</body>
</html>
